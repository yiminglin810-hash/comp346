<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>COMP346 Review</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Topic categories">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">M</span>
          <div>
            <h1>COMP346 Review</h1>
            <p>Music Intelligence simulation exam</p>
          </div>
        </div>
        <nav id="categoryList" class="category-list"></nav>
      </aside>

      <main class="main">
        <section class="topbar" aria-label="Review controls">
          <div>
            <p id="frequencyLabel" class="eyebrow"></p>
            <h2 id="categoryTitle"></h2>
          </div>
          <div class="controls">
            <label class="search">
              <span aria-hidden="true">⌕</span>
              <input id="searchInput" type="search" placeholder="搜索题目">
            </label>
            <button id="hideAllButton" type="button">全部隐藏答案</button>
            <button id="showAllButton" type="button">全部显示答案</button>
          </div>
        </section>

        <section class="filters" aria-label="Module filters">
          <div class="filter-group">
            <span class="filter-title">筛选模块</span>
            <div id="moduleFilter" class="year-filter"></div>
          </div>
          <button id="clearModuleFilterButton" class="clear-filter" type="button">显示全部模块</button>
        </section>

        <section class="stats" aria-label="Category stats">
          <div>
            <span id="topicCount">0</span>
            <p>题目</p>
          </div>
          <div>
            <span id="visibleCount">0</span>
            <p>当前显示</p>
          </div>
          <div>
            <span id="answerCount">0</span>
            <p>已展开答案</p>
          </div>
        </section>

        <section id="cards" class="cards" aria-live="polite"></section>
      </main>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
